set_alarm_detection_sensibility:
  target:
    entity:
      integration: ezviz
      domain: camera
  fields:
    level:
      required: true
      example: 3
      default: 3
      selector:
        number:
          min: 1
          max: 100
          step: 1
          mode: box
    type_value:
      required: true
      example: "0"
      default: "0"
      selector:
        select:
          options:
            - "0"
            - "3"

wake_device:
  target:
    entity:
      integration: ezviz
      domain: camera

debug_authenticated_request:
  target:
    entity:
      integration: ezviz
      domain: camera
  fields:
    path:
      required: true
      example: "/v3/devices/{serial}/{channel}/sendAlarm"
      selector:
        text:
    method:
      required: false
      example: "PUT"
      default: "PUT"
      selector:
        select:
          options:
            - "GET"
            - "POST"
            - "PUT"
            - "DELETE"
    channel:
      required: false
      example: 1
      default: 0
      selector:
        number:
          min: 0
          step: 1
          mode: box
    params:
      required: false
      example: {}
      default: {}
      selector:
        object:
    headers:
      required: false
      example:
        deviceSerial: "{serial}"
      default: {}
      selector:
        object:
    data:
      required: false
      example:
        enable: 2
      default: {}
      selector:
        object:
    body_format:
      required: false
      example: "form"
      default: "form"
      selector:
        select:
          options:
            - "form"
            - "json"
    log_response:
      required: false
      example: true
      default: true
      selector:
        boolean:
    redact_response:
      required: false
      example: true
      default: true
      selector:
        boolean:
